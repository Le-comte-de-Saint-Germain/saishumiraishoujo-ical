<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tools</title>
  <style>
    :root{
      --bg:#05040a;
      --txt:rgba(255,255,255,.92);
      --sub:rgba(255,255,255,.62);
      --line:rgba(255,255,255,.12);
      --card:rgba(0,0,0,.26);
      --acc:rgba(195,170,255,.92);
    }
    body{
      margin:0; min-height:100vh;
      background: radial-gradient(900px 600px at 20% 15%, rgba(120,80,255,.14), transparent 60%),
                  radial-gradient(900px 600px at 85% 25%, rgba(70,140,255,.10), transparent 60%),
                  var(--bg);
      color:var(--txt);
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Arial, sans-serif;
      padding: 28px 16px;
    }
    .wrap{ width:min(920px, 100%); margin:0 auto; }
    h1{ margin:0 0 6px; font-size:18px; letter-spacing:.08em; font-weight:650; }
    p{ margin:0 0 18px; color:var(--sub); font-size:14px; line-height:1.8; }
    .grid{
      display:grid;
      grid-template-columns: 1fr;
      gap:12px;
    }
    @media(min-width:720px){
      .grid{ grid-template-columns: 1fr 1fr; }
    }
    a.card{
      display:block;
      text-decoration:none;
      color:var(--txt);
      border:1px solid var(--line);
      background: var(--card);
      border-radius:18px;
      padding:16px 16px;
      backdrop-filter: blur(10px);
      transition: transform .08s ease, border-color .18s ease;
    }
    a.card:hover{ transform: translateY(-1px); border-color: rgba(195,170,255,.45); }
    .title{ font-weight:650; letter-spacing:.02em; }
    .meta{ margin-top:6px; color:var(--sub); font-size:13px; line-height:1.7; }
    .tag{
      display:inline-block; margin-top:10px;
      font-size:12px; color:var(--acc);
      border:1px solid rgba(195,170,255,.25);
      padding:6px 10px; border-radius:999px;
    }
    .toplink{
      display:inline-block; margin-top:18px;
      color:var(--sub); text-decoration:none;
      border-bottom:1px solid rgba(255,255,255,.18);
      padding-bottom:2px;
    }
    .toplink:hover{ border-bottom-color: rgba(255,255,255,.45); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Tools</h1>
    <p>—</p>

    <div class="grid">
      <a class="card" href="./sms-calendar/">
        <div class="title">SMS Schedule Calendar</div>
        <div class="meta">最終未来少女のスケジュールを購読（Apple / Google）</div>
        <span class="tag">calendar</span>
      </a>
    </div>

    <a class="toplink" href="/">← Top</a>
  </div>
</body>
</html>
