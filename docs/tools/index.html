<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>最終未来少女 非公式カレンダー</title>
  <style>
    *{ box-sizing: border-box; }
    html,body{ height:100%; margin:0; background:#000; color:#fff; }

    body{
      min-height: 100svh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Arial, sans-serif;
    }

    /* 上から1/3にタイトル（中央揃え） */
    .title{
      position: fixed;
      left: 50%;
      top: 33.333svh;
      transform: translate(-50%, -50%);
      margin: 0;
      text-align: center;

      /* 最大30px。狭い/設定が怪しい環境では自動で少し縮む */
      font-size: clamp(24px, 6vw, 30px);
      font-weight: 850;
      letter-spacing: .08em;
      line-height: 1.28; /* 行間は少し余裕 */
    }

    /* 上段は必ず1行、下段もできるだけ1行に固定 */
    .nowrap{ white-space: nowrap; }

    /* 半行分の空き（視覚的に“半行”に寄せる） */
    .gap{ display:block; height:.5em; }

    /* 下から1/3にボタン（中央揃え） */
    .btn{
      position: fixed;
      left: 50%;
      top: 66.666svh;              /* 下から1/3 = 上から2/3 */
      transform: translate(-50%, -50%);
      margin: 0;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 18px 26px;
      min-width: min(420px, 90vw);
      border-radius: 18px;

      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.28);
      color: #fff;
      text-decoration: none;

      font-size: 16px;
      font-weight: 850;
      letter-spacing: .06em;

      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active{ filter: brightness(1.06); }
  </style>
</head>

<body>
  <h1 class="title">
    <span class="nowrap">最終未来少女</span><br>
    <span class="gap" aria-hidden="true"></span>
    <span class="nowrap">非公式カレンダー</span>
  </h1>

  <a class="btn" href="webcal://サンジェルマン伯爵.com/sms-schedule.ics">
    自分のカレンダーに追加（iCal）
  </a>
</body>
</html>
