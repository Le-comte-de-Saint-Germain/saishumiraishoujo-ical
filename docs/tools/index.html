<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>最終未来少女 非公式カレンダー</title>
  <style>
    *{ box-sizing: border-box; }
    html,body{ height:100%; margin:0; color:#fff; background:#000; }

    body{
      min-height: 100svh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Arial, sans-serif;
      position: relative;
      background: transparent;
    }

    /* 背景：絶対URLで固定 */
    body::before{
      content:"";
      position: fixed;
      inset: 0;
      z-index: -1;
      background: url("https://サンジェルマン伯爵.com/tools/sms-calendar/bg.jpg?v=999") center / cover no-repeat;
      background-color:#000;
      transform: translateZ(0);
    }

    /* タイトル：上から1/5（20%） */
    .title{
      position: fixed;
      left: 50%;
      top: 20svh;
      transform: translate(-50%, -50%);
      margin: 0;
      text-align: center;
      color: #fff;

      font-size: clamp(26px, 6.4vw, 34px);
      font-weight: 850;
      letter-spacing: .08em;
      line-height: 1.28;
    }

    .nowrap{ white-space: nowrap; }
    .gap{ display:block; height:.5em; }

    /* ボタン：下から1/3（上から2/3）、横幅を10%削減 */
    .btn{
      position: fixed;
      left: 50%;
      top: 66.666svh;
      transform: translate(-50%, -50%);
      margin: 0;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 16px 22px;
      border-radius: 18px;

      width: min(306px, 64.8vw); /* ← 340px→306px、72vw→64.8vw（各10%減） */

      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.28);
      color: #fff;
      text-decoration: none;

      font-size: 16px;
      font-weight: 850;
      letter-spacing: .04em;

      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active{ filter: brightness(1.06); }
  </style>
</head>

<body>
  <h1 class="title">
    <span class="nowrap">最終未来少女</span><br>
    <span class="gap" aria-hidden="true"></span>
    <span class="nowrap">非公式カレンダー</span>
  </h1>

  <a class="btn" href="webcal://サンジェルマン伯爵.com/sms-schedule.ics">
    自分のカレンダーに追加（iCal）
  </a>
</body>
</html>
