<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>最終未来少女 非公式カレンダー</title>
  <style>
    *{ box-sizing: border-box; }
    html,body{ height:100%; margin:0; background:#000; color:#fff; }

    body{
      min-height: 100svh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Arial, sans-serif;
    }

    /* 上から1/3にタイトル（中央揃え） */
    .title{
      position: fixed;
      left: 50%;
      top: 33.333svh;
      transform: translate(-50%, -50%); /* 中心を 1/3 に置く */
      margin: 0;
      text-align: center;

      /* 前回比で約3割増を意図 */
      font-size: clamp(34px, 7.8vw, 52px);
      font-weight: 850;
      letter-spacing: .08em;
      line-height: 1.28; /* 2行間に半行っぽい余裕が出る */
    }

    /* 下から1/3にボタン（中央揃え） */
    .btn{
      position: fixed;
      left: 50%;
      top: 66.666svh;              /* 下から1/3 = 上から2/3 */
      transform: translate(-50%, -50%);
      margin: 0;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 18px 30px;
      min-width: min(360px, 86vw);
      border-radius: 18px;

      background: rgba(255,255,255,.22); /* 半透明の白 */
      border: 1px solid rgba(255,255,255,.28);
      color: #fff;
      text-decoration: none;

      font-size: 18px;
      font-weight: 850;
      letter-spacing: .10em;

      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ちょい触りやすく */
    .btn:active{ filter: brightness(1.06); }
  </style>
</head>

<body>
  <h1 class="title">
    最終未来少女<br><span style="display:block; height:.5em"></span>非公式カレンダー
  </h1>

  <a class="btn" href="webcal://サンジェルマン伯爵.com/sms-schedule.ics">追加（iCal）</a>
</body>
</html>
