<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>最終未来少女 非公式カレンダー</title>
  <style>
    :root{
      --phi: 1.61803398875;
      --top-break: calc(100svh / var(--phi));              /* 上から 0.618...H */
      --bottom-break: calc(100svh - (100svh / var(--phi)));/* 上から 0.382...H */
    }

    *{ box-sizing: border-box; }
    html,body{ height:100%; margin:0; background:#000; color:#fff; }

    body{
      min-height: 100svh;
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", "Segoe UI", Arial, sans-serif;
    }

    /* 2行タイトル：2行目の下端を黄金比境目に合わせる */
    .title{
      position: fixed;
      left: 50%;
      top: var(--top-break);
      transform: translate(-50%, -100%); /* 下端を top に一致させる */
      margin: 0;
      text-align: center;
      line-height: 1.18;
      letter-spacing: .08em;
      font-weight: 800;
      font-size: clamp(26px, 6vw, 40px);
      white-space: nowrap;
    }

    /* ボタン：上端を黄金比（下から）境目に合わせる */
    .btn{
      position: fixed;
      left: 50%;
      top: var(--bottom-break);          /* ここがボタン上端の基準 */
      transform: translateX(-50%);
      margin: 0;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      padding: 16px 28px;
      min-width: 220px;
      border-radius: 16px;

      background: transparent;
      border: 2px solid #fff;
      color: #fff;
      text-decoration: none;

      font-size: 18px;
      font-weight: 800;
      letter-spacing: .12em;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
  </style>
</head>

<body>
  <h1 class="title">
    最終未来少女<br>
    非公式カレンダー
  </h1>

  <a class="btn" href="webcal://サンジェルマン伯爵.com/sms-schedule.ics">購読</a>
</body>
</html>
